name: Daily Bankruptcy Sync & Scoring

on:
  schedule:
    # Runs at 07:00 UTC (2:00 AM Dallas Time)
    - cron: '0 7 * * *'
  workflow_dispatch: # Allows manual trigger

# THIS SILENCES THE WARNING:
# It forces all actions to run on the newer Node 24 engine immediately
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        # UPGRADED from v4 to v6 (Supports Node 24 natively)
        uses: actions/checkout@v6
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run Bankruptcy Import
        run: bun scripts/import-bankruptcy.ts --days-back 2
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          COURTLISTENER_TOKEN: ${{ secrets.COURTLISTENER_TOKEN }}

      - name: Trigger AI Scoring
        run: |
          curl -X POST https://YOUR-ACTUAL-DOMAIN.com/api/cron/score \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"